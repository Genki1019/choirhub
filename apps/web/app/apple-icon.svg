  <circle cx="50" cy="43"  r="16"   fill="white"/>
  <circle cx="79" cy="54" r="12.5" fill="white" fill-opacity="0.70"/>

  <!-- Sound wave -->
  <path d="M9,76 Q28,60 47,76 Q66,92 85,76 Q90,72 93,73"
        stroke="white" stroke-width="3.5" fill="none"
        stroke-opacity="0.65" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

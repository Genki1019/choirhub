packages:
  - "apps/*"

overrides:
  postcss: ">=8.5.10"
  esbuild: ">=0.28.1"

allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  argon2: true
  esbuild: true
  prisma: true
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - argon2
  - esbuild
  - prisma
  - sharp
  - unrs-resolver
